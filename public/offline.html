<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#C4382A" />
  <title>LineCut — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #FFFDF5;
      color: #1A1A18;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .scissors {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      opacity: 0.6;
    }

    .brand {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: 36px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #C4382A;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: 28px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: #1A1A18;
    }

    p {
      font-size: 16px;
      line-height: 1.5;
      color: #8C8778;
      margin-bottom: 32px;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #C4382A;
      color: #FFFDF5;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .retry-btn:hover { opacity: 0.9; }
    .retry-btn:active { opacity: 0.8; }

    .divider {
      border: none;
      border-top: 1px dashed #ddd4c4;
      margin: 32px 0;
    }

    .hint {
      font-size: 13px;
      color: #8C8778;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="scissors" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="7" fill="#1A1A18"/>
      <ellipse cx="11" cy="10" rx="5" ry="4.5" stroke="#C4382A" stroke-width="2" fill="none"/>
      <line x1="15" y1="13" x2="23" y2="25" stroke="#C4382A" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="21" cy="10" rx="5" ry="4.5" stroke="#C4382A" stroke-width="2" fill="none"/>
      <line x1="17" y1="13" x2="9" y2="25" stroke="#C4382A" stroke-width="2.5" stroke-linecap="round"/>
    </svg>

    <div class="brand">LineCut</div>

    <h1>You're offline</h1>
    <p>We'll be back when you're connected. Check your Wi-Fi or mobile data and try again.</p>

    <button class="retry-btn" onclick="location.reload()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Try again
    </button>

    <hr class="divider" />

    <p class="hint">Your orders and notifications will sync when you reconnect.</p>
  </div>
</body>
</html>
